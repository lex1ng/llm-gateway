# Tier-based routing configuration
tier_routing:
  small:
    - provider: "alibaba"
      model: "qwen-turbo"
      priority: 1
    - provider: "deepseek"
      model: "deepseek-chat"
      priority: 2
    - provider: "zhipu"
      model: "glm-4-flash"
      priority: 3
    - provider: "openai"
      model: "gpt-4o-mini"
      priority: 4

  medium:
    - provider: "alibaba"
      model: "qwen-plus"
      priority: 1
    - provider: "deepseek"
      model: "deepseek-chat"
      priority: 2
    - provider: "openai"
      model: "gpt-4o-mini"
      priority: 3

  large:
    - provider: "openai"
      model: "gpt-4o"
      priority: 1
    - provider: "anthropic"
      model: "Claude Opus 4.6"
      priority: 2
    - provider: "deepseek"
      model: "deepseek-reasoner"
      priority: 3
    - provider: "alibaba"
      model: "qwen-max"
      priority: 4
    - provider: "volcengine"
      model: "doubao-1.5-pro-256k"
      priority: 5
