# Tier-based routing configuration
tier_routing:
  small:
    - provider: "alibaba"
      model: "qwen-turbo"
      priority: 1
    - provider: "openai"
      model: "gpt-4o-mini"
      priority: 2
    - provider: "anthropic"
      model: "claude-3-5-haiku-20241022"
      priority: 3

  medium:
    - provider: "alibaba"
      model: "qwen-plus"
      priority: 1
    - provider: "openai"
      model: "gpt-4o-mini"
      priority: 2

  large:
    - provider: "openai"
      model: "gpt-4o"
      priority: 1
    - provider: "anthropic"
      model: "claude-sonnet-4-5-20250929"
      priority: 2
    - provider: "alibaba"
      model: "qwen-max"
      priority: 3
